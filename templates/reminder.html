<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
  body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
  .header { background: #f59e0b; color: white; padding: 20px; border-radius: 8px 8px 0 0; }
  .content { background: #fffbeb; padding: 20px; border: 1px solid #fde68a; border-top: none; border-radius: 0 0 8px 8px; }
  .due-date { font-size: 18px; font-weight: bold; color: #b45309; }
  .footer { margin-top: 20px; font-size: 12px; color: #64748b; }
  </style>
</head>
<body>
  <div class="header">
    <h2>⏰ Reminder</h2>
  </div>
  <div class="content">
    <p>Hi {{ recipient_name }},</p>
    <p>This is a reminder about:</p>
    <p><strong>{{ task_title }}</strong></p>
    <p class="due-date">Due: {{ due_date }}</p>
    {% if notes %}
    <p>{{ notes }}</p>
    {% endif %}
  </div>
  <div class="footer">
    <p>This is an automated reminder from Email Automation Bot.</p>
  </div>
</body>
</html>

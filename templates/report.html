<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
  body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
  .header { background: #2563eb; color: white; padding: 20px; border-radius: 8px 8px 0 0; }
  .content { background: #f8fafc; padding: 20px; border: 1px solid #e2e8f0; border-top: none; border-radius: 0 0 8px 8px; }
  .footer { margin-top: 20px; font-size: 12px; color: #64748b; }
  </style>
</head>
<body>
  <div class="header">
    <h2>📊 {{ report_title }}</h2>
  </div>
  <div class="content">
    <p>Hi {{ recipient_name }},</p>
    <p>Please find your automated report for <strong>{{ report_date }}</strong> below.</p>
    <p>{{ report_summary }}</p>
    <p>Any attached files are included with this email.</p>
  </div>
  <div class="footer">
    <p>This is an automated report from Email Automation Bot.</p>
  </div>
</body>
</html>
